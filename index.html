<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>My Day</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="My Day">
<meta name="theme-color" content="#0f1115">
<link rel="apple-touch-icon" href="icon.png">
<style>
:root{
  --bg:#0f1115; --card:#1a1e27; --text:#e8eaf0; --muted:#8b93a7;
  --accent:#5b8cff; --good:#34c77b; --warn:#ffb02e; --bad:#ff5d5d; --radius:12px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  height:100%; overscroll-behavior:none;}
body{display:flex; flex-direction:column;
  padding-top:env(safe-area-inset-top);}
header.appbar{display:flex; align-items:center; justify-content:space-between;
  padding:10px 16px 6px;}
header.appbar h1{font-size:20px; margin:0; font-weight:700;}
header.appbar .bar-actions{display:flex; gap:8px;}
#main{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 12px 16px;}
.view{display:none;}
.view.active{display:block;}
#tabbar{display:flex; overflow-x:auto; -webkit-overflow-scrolling:touch;
  gap:2px; padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  background:#141822; border-top:1px solid #232838; scrollbar-width:none;}
#tabbar::-webkit-scrollbar{display:none;}
.tab-btn{flex:0 0 auto; min-width:64px; min-height:52px; border:none; background:none;
  color:var(--muted); display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:2px; border-radius:10px; font-size:11px; padding:4px 8px;}
.tab-btn .tab-ic{font-size:20px; line-height:1;}
.tab-btn.active{color:var(--accent); background:rgba(91,140,255,.12);}
.card{background:var(--card); border-radius:var(--radius); padding:14px; margin:10px 0;}
.btn{min-height:44px; padding:8px 16px; border-radius:10px; border:1px solid #2a3040;
  background:#222735; color:var(--text); font-size:15px;}
.btn:active{opacity:.7;}
.btn-primary{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600;}
input,select,textarea{background:#12151d; color:var(--text); border:1px solid #2a3040;
  border-radius:10px; padding:10px 12px; font-size:16px; min-height:44px; font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent); outline-offset:-1px;}
h2{font-size:17px; margin:14px 4px 6px;}
.muted{color:var(--muted);}
#toast{position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px);
  background:#2a3142; color:var(--text); padding:10px 18px; border-radius:20px;
  opacity:0; pointer-events:none; transition:all .25s; z-index:1200; font-size:14px;
  max-width:85vw; text-align:center;}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header class="appbar">
  <h1>My Day</h1>
  <div class="bar-actions">
    <button class="btn" id="btn-export" title="Export backup">⬇︎ Backup</button>
    <button class="btn" id="btn-import" title="Import backup">⬆︎ Restore</button>
    <input type="file" id="import-file" accept="application/json,.json" style="display:none">
  </div>
</header>
<main id="main"></main>
<nav id="tabbar"></nav>
<div id="toast" role="status"></div>
<script>
/* ============ CORE — store, bus, tabs, utils (do not edit per-feature) ============ */
(function () {
  'use strict';
  const STORE_KEY = 'dreamapp.data.v1';

  const DEFAULT_DATA = () => ({
    version: 1,
    tasks: [],
    events: [],
    notes: [],
    shopping: [],
    reminders: [],
    timer: { taskId: null, mode: 'idle', endsAt: null, startedAt: null, focusMinutes: 25, breakMinutes: 5 },
    settings: {},
  });

  // ---------- store ----------
  function load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return DEFAULT_DATA();
      const parsed = JSON.parse(raw);
      // merge with defaults so old backups never miss keys
      const base = DEFAULT_DATA();
      for (const k of Object.keys(base)) if (parsed[k] === undefined) parsed[k] = base[k];
      parsed.timer = Object.assign(DEFAULT_DATA().timer, parsed.timer || {});
      return parsed;
    } catch (e) { console.error('store load failed', e); return DEFAULT_DATA(); }
  }

  const modules = {};   // name -> module def
  const busMap = {};    // event -> [fn]

  const App = {
    modules,
    store: {
      data: load(),
      save() {
        try { localStorage.setItem(STORE_KEY, JSON.stringify(App.store.data)); }
        catch (e) { console.error('store save failed', e); }
        for (const name of Object.keys(modules)) {
          const m = modules[name];
          if (m.onDataChanged) { try { m.onDataChanged(); } catch (e) { console.error(name + ' onDataChanged', e); } }
        }
      },
      replace(newData) { // used by import
        const base = DEFAULT_DATA();
        for (const k of Object.keys(base)) if (newData[k] === undefined) newData[k] = base[k];
        App.store.data = newData;
        App.store.save();
      },
      exportJSON() { return JSON.stringify(App.store.data, null, 2); },
    },
    bus: {
      on(name, fn) { (busMap[name] = busMap[name] || []).push(fn); },
      emit(name, payload) {
        for (const fn of (busMap[name] || [])) { try { fn(payload); } catch (e) { console.error('bus ' + name, e); } }
      },
    },
    ui: {
      showTab(name) {
        if (!modules[name]) return;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const view = document.getElementById('view-' + name);
        const btn = document.getElementById('tab-' + name);
        if (view) view.classList.add('active');
        if (btn) { btn.classList.add('active'); btn.scrollIntoView({ inline: 'center', block: 'nearest' }); }
        App.ui.currentTab = name;
        const m = modules[name];
        if (m.onShow) { try { m.onShow(); } catch (e) { console.error(name + ' onShow', e); } }
      },
      currentTab: null,
      toast(msg) {
        const t = document.getElementById('toast');
        if (!t) return;
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(App.ui._toastT);
        App.ui._toastT = setTimeout(() => t.classList.remove('show'), 2200);
      },
    },
    util: {
      uuid() {
        return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
      },
      esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      },
      pad(n) { return String(n).padStart(2, '0'); },
      todayStr(d) {
        d = d || new Date();
        return d.getFullYear() + '-' + App.util.pad(d.getMonth() + 1) + '-' + App.util.pad(d.getDate());
      },
      nowLocalISO() { // 'YYYY-MM-DDTHH:MM' local, for datetime-local inputs
        const d = new Date();
        return App.util.todayStr(d) + 'T' + App.util.pad(d.getHours()) + ':' + App.util.pad(d.getMinutes());
      },
      fmtDate(iso) { // 'YYYY-MM-DD...' -> 'Fri 10 Jul'
        if (!iso) return '';
        const d = new Date(iso.length <= 10 ? iso + 'T00:00' : iso);
        if (isNaN(d)) return iso;
        return d.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
      },
      fmtTime(iso) {
        if (!iso) return '';
        const d = new Date(iso.length <= 10 ? iso + 'T00:00' : iso);
        if (isNaN(d)) return '';
        return App.util.pad(d.getHours()) + ':' + App.util.pad(d.getMinutes());
      },
      beep(times) {
        times = times || 1;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          App.util._ac = App.util._ac || new AC();
          const ac = App.util._ac;
          if (ac.state === 'suspended') ac.resume();
          for (let i = 0; i < times; i++) {
            const o = ac.createOscillator(), g = ac.createGain();
            o.type = 'sine'; o.frequency.value = 880;
            g.gain.setValueAtTime(0.0001, ac.currentTime + i * 0.4);
            g.gain.exponentialRampToValueAtTime(0.3, ac.currentTime + i * 0.4 + 0.02);
            g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + i * 0.4 + 0.3);
            o.connect(g); g.connect(ac.destination);
            o.start(ac.currentTime + i * 0.4); o.stop(ac.currentTime + i * 0.4 + 0.35);
          }
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        } catch (e) { /* sound is best-effort */ }
      },
    },
    register(name, def) { modules[name] = def; },
    boot() {
      const tabbar = document.getElementById('tabbar');
      const main = document.getElementById('main');
      const names = Object.keys(modules).sort((a, b) => (modules[a].order || 99) - (modules[b].order || 99));
      for (const name of names) {
        const m = modules[name];
        if (m.styles) {
          const st = document.createElement('style');
          st.textContent = m.styles;
          document.head.appendChild(st);
        }
        const view = document.createElement('section');
        view.className = 'view'; view.id = 'view-' + name;
        main.appendChild(view);
        const btn = document.createElement('button');
        btn.className = 'tab-btn'; btn.id = 'tab-' + name; btn.type = 'button';
        btn.innerHTML = '<span class="tab-ic">' + m.icon + '</span><span class="tab-lb">' + m.title + '</span>';
        btn.addEventListener('click', () => App.ui.showTab(name));
        tabbar.appendChild(btn);
        try { m.render(view); } catch (e) { console.error(name + ' render', e); }
      }
      App.ui.showTab(names[0]);
      setInterval(() => {
        const now = Date.now();
        for (const name of names) {
          const m = modules[name];
          if (m.onTick) { try { m.onTick(now); } catch (e) { console.error(name + ' onTick', e); } }
        }
      }, 1000);
      // backup: export / import
      const exp = document.getElementById('btn-export');
      if (exp) exp.addEventListener('click', () => {
        const blob = new Blob([App.store.exportJSON()], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'productivity-backup-' + App.util.todayStr() + '.json';
        document.body.appendChild(a); a.click(); a.remove();
        App.ui.toast('Backup exported');
      });
      const impInput = document.getElementById('import-file');
      const imp = document.getElementById('btn-import');
      if (imp && impInput) {
        imp.addEventListener('click', () => impInput.click());
        impInput.addEventListener('change', () => {
          const f = impInput.files && impInput.files[0];
          if (!f) return;
          const r = new FileReader();
          r.onload = () => {
            try {
              const d = JSON.parse(r.result);
              if (!d || typeof d !== 'object' || !Array.isArray(d.tasks)) throw new Error('not a backup file');
              App.store.replace(d);
              App.ui.toast('Backup restored');
            } catch (e) { App.ui.toast('Import failed: not a valid backup'); }
            impInput.value = '';
          };
          r.readAsText(f);
        });
      }
    },
  };
  window.App = App;
})();
App.register('dashboard', {
  title: 'Home',
  icon: '🏠',
  order: 1,
  styles: `
    #view-dashboard { padding: 12px; }
    #view-dashboard .dash-greet { padding: 10px 4px 14px; }
    #view-dashboard .dash-greet h2 { margin: 0 0 4px; font-size: 1.4em; }
    #view-dashboard .dash-greet .dash-date { color: var(--muted); font-size: 0.95em; }
    #view-dashboard .card { margin-bottom: 12px; padding: 12px; }
    #view-dashboard .dash-card-title { font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    #view-dashboard .dash-overdue { border-left: 4px solid var(--bad); }
    #view-dashboard .dash-overdue .dash-card-title { color: var(--bad); }
    #view-dashboard .dash-row {
      display: flex; align-items: center; gap: 10px;
      min-height: 44px; padding: 4px 2px; cursor: pointer;
      border-bottom: 1px solid rgba(139,147,167,0.12);
    }
    #view-dashboard .dash-row:last-child { border-bottom: none; }
    #view-dashboard .dash-row .dash-main { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #view-dashboard .dash-row .dash-sub { color: var(--muted); font-size: 0.85em; flex-shrink: 0; }
    #view-dashboard .dash-done .dash-main { text-decoration: line-through; color: var(--muted); }
    #view-dashboard .dash-check {
      width: 26px; height: 26px; flex-shrink: 0; margin: 0;
      accent-color: var(--good);
    }
    #view-dashboard .dash-checkwrap {
      width: 44px; height: 44px; flex-shrink: 0; margin: -4px 0 -4px -8px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    #view-dashboard .dash-more {
      min-height: 44px; display: flex; align-items: center;
      color: var(--accent); cursor: pointer; padding: 4px 2px;
    }
    #view-dashboard .dash-tap { cursor: pointer; }
    #view-dashboard .dash-focus { border-left: 4px solid var(--accent); }
    #view-dashboard .dash-focus-remain { font-size: 1.6em; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 4px; }
    #view-dashboard .dash-empty { color: var(--muted); padding: 6px 2px; min-height: 44px; display: flex; align-items: center; }
    #view-dashboard .dash-section-label { color: var(--muted); font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; margin: 8px 0 2px; }
    #view-dashboard .dash-quickadd { display: flex; gap: 8px; margin-bottom: 12px; }
    #view-dashboard .dash-quickadd input[type="text"] {
      flex: 1; min-height: 44px; min-width: 0; padding: 0 12px;
      background: var(--card); color: var(--text);
      border: 1px solid rgba(139,147,167,0.25); border-radius: var(--radius);
      font-size: 1em;
    }
    #view-dashboard .dash-quickadd .btn { min-height: 44px; min-width: 44px; }
  `,

  _root: null,
  _day: null,

  render(el) {
    this._root = el;
    el.innerHTML = `
      <div class="dash-greet"><h2></h2><div class="dash-date"></div></div>
      <div class="dash-cards"></div>
      <div class="dash-quickadd">
        <input type="text" placeholder="Quick add a task…" aria-label="Quick add a task">
        <button type="button" class="btn btn-primary dash-add-btn">Add</button>
      </div>
    `;

    const input = el.querySelector('.dash-quickadd input');
    const addTask = () => {
      const title = input.value.trim();
      if (!title) return;
      App.store.data.tasks.push({
        id: App.util.uuid(),
        title: title,
        detail: '',
        due: null,
        priority: 'med',
        status: 'todo',
        createdAt: new Date().toISOString(),
        completedAt: null,
        focusedMinutes: 0,
        noteIds: [],
        alarmDismissed: false,
      });
      input.value = '';
      App.store.save();
      App.ui.toast('Task added');
    };
    el.querySelector('.dash-add-btn').addEventListener('click', addTask);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });

    // Delegated taps for all dynamic cards
    el.querySelector('.dash-cards').addEventListener('click', (e) => {
      const toggle = e.target.closest('[data-act="toggle-task"]');
      if (toggle) {
        e.stopPropagation();
        const t = App.store.data.tasks.find(x => x.id === toggle.dataset.id);
        if (t) {
          if (t.status === 'done') { t.status = 'todo'; t.completedAt = null; }
          else { t.status = 'done'; t.completedAt = new Date().toISOString(); }
          App.store.save();
        }
        return;
      }
      const hit = e.target.closest('[data-act]');
      if (!hit) return;
      const act = hit.dataset.act;
      if (act === 'open-task') {
        App.ui.showTab('tasks');
        App.bus.emit('task:open', { taskId: hit.dataset.id });
      } else if (act === 'more-tasks') {
        App.ui.showTab('tasks');
      } else if (act === 'focus') {
        App.ui.showTab('timer');
      } else if (act === 'event') {
        App.ui.showTab('calendar');
      } else if (act === 'reminder') {
        App.ui.showTab('alarms');
      } else if (act === 'shopping') {
        App.ui.showTab('shopping');
      } else if (act === 'open-note') {
        App.ui.showTab('notes');
        App.bus.emit('note:open', { noteId: hit.dataset.id });
      }
    });

    this._rebuild();
  },

  onShow() { this._rebuild(); },
  onDataChanged() { this._rebuild(); },

  onTick(now) {
    if (!this._root) return;
    // cheap: only update the focus countdown text
    const remainEl = this._root.querySelector('.dash-focus-remain');
    const timer = App.store.data.timer;
    if (remainEl && timer.mode !== 'idle' && timer.endsAt) {
      remainEl.textContent = this._mmss(timer.endsAt - now);
    } else if (remainEl && timer.mode === 'idle') {
      // timer went idle without a save reaching us — rebuild once
      this._rebuild();
    }
    // rebuild once when the local date rolls over
    const day = App.util.todayStr();
    if (day !== this._day) this._rebuild();
  },

  _mmss(ms) {
    const s = Math.max(0, Math.round(ms / 1000));
    return App.util.pad(Math.floor(s / 60)) + ':' + App.util.pad(s % 60);
  },

  _relAge(iso) {
    const then = new Date(iso).getTime();
    if (isNaN(then)) return '';
    const s = Math.max(0, Math.floor((Date.now() - then) / 1000));
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    if (s < 86400) return Math.floor(s / 3600) + 'h ago';
    return Math.floor(s / 86400) + 'd ago';
  },

  _taskRow(t, withCheck) {
    const esc = App.util.esc;
    const done = t.status === 'done';
    const sub = t.due ? esc(App.util.fmtTime(t.due)) : '';
    const check = withCheck
      ? '<span class="dash-checkwrap"><input type="checkbox" class="dash-check" data-act="toggle-task" data-id="' + esc(t.id) + '"' + (done ? ' checked' : '') + ' aria-label="Mark done"></span>'
      : '';
    return '<div class="dash-row' + (done ? ' dash-done' : '') + '">' + check +
      '<span class="dash-main" data-act="open-task" data-id="' + esc(t.id) + '">' + esc(t.title) + '</span>' +
      (sub ? '<span class="dash-sub">' + sub + '</span>' : '') +
      '</div>';
  },

  _rebuild() {
    if (!this._root) return;
    const esc = App.util.esc;
    const d = App.store.data;
    const now = new Date();
    const nowMs = now.getTime();
    const today = App.util.todayStr();
    this._day = today;

    // 1. greeting
    const h = now.getHours();
    const greet = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
    this._root.querySelector('.dash-greet h2').textContent = greet;
    this._root.querySelector('.dash-greet .dash-date').textContent =
      now.toLocaleDateString(undefined, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    let html = '';

    // 2. overdue
    const overdue = d.tasks
      .filter(t => t.status !== 'done' && t.due && new Date(t.due).getTime() < nowMs)
      .sort((a, b) => a.due < b.due ? -1 : 1);
    if (overdue.length) {
      html += '<div class="card dash-overdue"><div class="dash-card-title">⚠ Overdue</div>';
      for (const t of overdue.slice(0, 5)) {
        html += '<div class="dash-row" data-act="open-task" data-id="' + esc(t.id) + '">' +
          '<span class="dash-main">' + esc(t.title) + '</span>' +
          '<span class="dash-sub">' + esc(App.util.fmtDate(t.due)) + ' ' + esc(App.util.fmtTime(t.due)) + '</span></div>';
      }
      if (overdue.length > 5) {
        html += '<div class="dash-more" data-act="more-tasks">+' + (overdue.length - 5) + ' more → Tasks</div>';
      }
      html += '</div>';
    }

    // 3. focus / timer
    if (d.timer.mode !== 'idle') {
      let label = d.timer.mode === 'break' ? 'Break' : 'Focus session';
      if (d.timer.mode === 'focus' && d.timer.taskId) {
        const t = d.tasks.find(x => x.id === d.timer.taskId);
        if (t) label = 'Focusing on ' + t.title;
      }
      html += '<div class="card dash-focus dash-tap" data-act="focus">' +
        '<div class="dash-card-title">⏱ ' + esc(label) + '</div>' +
        '<div class="dash-focus-remain">' + (d.timer.endsAt ? this._mmss(d.timer.endsAt - nowMs) : '--:--') + '</div>' +
        '</div>';
    }

    // 4. today (always shown)
    const todayTasks = d.tasks
      .filter(t => t.due && t.due.slice(0, 10) === today)
      .sort((a, b) => a.due < b.due ? -1 : 1);
    const todayEvents = d.events
      .filter(e => e.date === today)
      .sort((a, b) => (a.start || '') < (b.start || '') ? -1 : 1);
    html += '<div class="card"><div class="dash-card-title">Today</div>';
    if (!todayTasks.length && !todayEvents.length) {
      html += '<div class="dash-empty">Nothing scheduled — enjoy it</div>';
    } else {
      if (todayTasks.length) {
        html += '<div class="dash-section-label">Tasks</div>';
        for (const t of todayTasks) html += this._taskRow(t, true);
      }
      if (todayEvents.length) {
        html += '<div class="dash-section-label">Events</div>';
        for (const ev of todayEvents) {
          const time = ev.start ? esc(ev.start) + (ev.end ? '–' + esc(ev.end) : '') : 'all day';
          html += '<div class="dash-row" data-act="event">' +
            '<span class="dash-sub">' + time + '</span>' +
            '<span class="dash-main">' + esc(ev.title) + '</span></div>';
        }
      }
    }
    html += '</div>';

    // 5. next reminder
    const nextRem = d.reminders
      .filter(r => !r.fired && !r.dismissed && r.at && new Date(r.at).getTime() >= nowMs)
      .sort((a, b) => a.at < b.at ? -1 : 1)[0];
    if (nextRem) {
      const when = nextRem.at.slice(0, 10) === today
        ? 'Today ' + App.util.fmtTime(nextRem.at)

      else if (!t.due) g.nodate.push(t);
      else if (t.due < now) g.overdue.push(t);
      else if (t.due.slice(0, 10) === today) g.today.push(t);
      else g.upcoming.push(t);

    g.overdue.sort(byDue); g.today.sort(byDue); g.upcoming.sort(byDue);
    g.nodate.sort((a, b) => String(a.createdAt || '').localeCompare(String(b.createdAt || '')));

    #view-kanban .kb-clear.kb-armed {
      color: #fff;

      border-color: var(--bad);
    }
  `,

  _el: null,
  _clearArmed: false,
  _clearTimer: null,

  render(el) {
    this._el = el;
    const self = this;
    el.innerHTML =
      '<div class="kb-board">' +
        '<div class="kb-col" data-status="todo"></div>' +
        '<div class="kb-col" data-status="doing"></div>' +
        '<div class="kb-col" data-status="done"></div>' +
      '</div>';

    const board = el.querySelector('.kb-board');

    // ---- delegated taps ----
    board.addEventListener('click', function (e) {
      const btn = e.target.closest('[data-act]');
      if (!btn || !board.contains(btn)) return;
      const act = btn.getAttribute('data-act');

      if (act === 'clear-done') { self._clearDone(btn); return; }

      const cardEl = btn.closest('.kb-card');
      const task = cardEl && self._task(cardEl.getAttribute('data-id'));
      if (!task) return;

      if (act === 'open') {
        App.ui.showTab('tasks');
        App.bus.emit('task:open', { taskId: task.id });
      } else if (act === 'left' || act === 'right') {
        const cols = ['todo', 'doing', 'done'];
        const i = cols.indexOf(task.status) + (act === 'left' ? -1 : 1);
        if (i >= 0 && i < cols.length) self._move(task, cols[i]);
      }
    });

    // ---- quick add (input lives in the To Do column, re-rendered each time) ----
    board.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      const input = e.target.closest('.kb-quickadd input');
      if (!input) return;
      const title = input.value.trim();
      if (!title) return;
      App.store.data.tasks.push({
        id: App.util.uuid(),
        title: title,
        detail: '',
        due: null,
        priority: 'med',
        status: 'todo',
        createdAt: new Date().toISOString(),
        completedAt: null,
        focusedMinutes: 0,
        noteIds: [],
        alarmDismissed: false,
      });
      App.store.save(); // re-renders board, clearing the input
      App.ui.toast('Task added');
    });

    // ---- HTML5 drag & drop (desktop bonus, feature-detected) ----
    let dndOK = false;
    try {
      dndOK = ('draggable' in document.createElement('span')) &&
              typeof window !== 'undefined' && !!window.DataTransfer;
    } catch (e) { dndOK = false; }
    this._dnd = dndOK;
    if (dndOK) {
      board.addEventListener('dragstart', function (e) {
        const cardEl = e.target.closest ? e.target.closest('.kb-card') : null;
        if (!cardEl) return;
        try { e.dataTransfer.setData('text/plain', cardEl.getAttribute('data-id')); } catch (err) {}
        e.dataTransfer.effectAllowed = 'move';
        cardEl.classList.add('kb-dragging');
      });
      board.addEventListener('dragend', function (e) {
        const cardEl = e.target.closest ? e.target.closest('.kb-card') : null;
        if (cardEl) cardEl.classList.remove('kb-dragging');
        board.querySelectorAll('.kb-dragover').forEach(c => c.classList.remove('kb-dragover'));
      });
      board.addEventListener('dragover', function (e) {
        const col = e.target.closest ? e.target.closest('.kb-col') : null;
        if (!col) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        board.querySelectorAll('.kb-dragover').forEach(c => { if (c !== col) c.classList.remove('kb-dragover'); });
        col.classList.add('kb-dragover');
      });
      board.addEventListener('dragleave', function (e) {
        const col = e.target.closest ? e.target.closest('.kb-col') : null;
        if (col && !col.contains(e.relatedTarget)) col.classList.remove('kb-dragover');
      });
      board.addEventListener('drop', function (e) {
        const col = e.target.closest ? e.target.closest('.kb-col') : null;
        if (!col) return;
        e.preventDefault();
        col.classList.remove('kb-dragover');
        let id = '';
        try { id = e.dataTransfer.getData('text/plain'); } catch (err) {}
        const task = self._task(id);
        if (task) self._move(task, col.getAttribute('data-status'));
      });
    }

    this._renderBoard();
  },

  onDataChanged() { this._renderBoard(); },

  // ---------- helpers ----------
  _task(id) {
    return App.store.data.tasks.find(t => t.id === id) || null;
  },

  _move(task, status) {
    if (!status || task.status === status) return;
    task.status = status;
    task.completedAt = (status === 'done') ? new Date().toISOString() : null;
    App.store.save();
  },

  _clearDone(btn) {
    const self = this;
    if (!this._clearArmed) {
      this._clearArmed = true;
      btn.classList.add('kb-armed');
      btn.textContent = 'Tap again to delete';
      clearTimeout(this._clearTimer);
      this._clearTimer = setTimeout(function () {
        self._clearArmed = false;
        if (btn.isConnected) { btn.classList.remove('kb-armed'); btn.textContent = 'Clear done'; }
      }, 3000);
      return;
    }
    clearTimeout(this._clearTimer);
    this._clearArmed = false;
    const d = App.store.data;
    const doneIds = {};
    d.tasks.forEach(t => { if (t.status === 'done') doneIds[t.id] = true; });
    const n = Object.keys(doneIds).length;
    if (!n) return;
    d.tasks = d.tasks.filter(t => !doneIds[t.id]);
    d.notes.forEach(note => {
      if (note.taskIds && note.taskIds.some(id => doneIds[id])) {
        note.taskIds = note.taskIds.filter(id => !doneIds[id]);
      }
    });
    d.reminders = d.reminders.filter(r => !(r.taskId && doneIds[r.taskId]));
    App.store.save();
    App.ui.toast(n + (n === 1 ? ' task cleared' : ' tasks cleared'));
  },

  _cardHTML(t) {
    const esc = App.util.esc;
    const badges = [];
    if (t.due) {
      const overdue = t.status !== 'done' && new Date(t.due) < new Date();
      badges.push('<span class="kb-badge' + (overdue ? ' kb-overdue' : '') + '">' +
        esc(App.util.fmtDate(t.due)) + '</span>');
    }
    if (t.focusedMinutes > 0) {
      badges.push('<span class="kb-badge">&#9202; ' + esc(String(t.focusedMinutes)) + 'm</span>');
    }
    const pr = (t.priority === 'high' || t.priority === 'low') ? t.priority : 'med';
    return (
      '<div class="kb-card" data-id="' + esc(t.id) + '"' + (this._dnd ? ' draggable="true"' : '') + '>' +
        '<div class="kb-main" data-act="open">' +
          '<div class="kb-title"><span class="kb-dot p-' + pr + '"></span>' + esc(t.title) + '</div>' +
          '<div class="kb-badges">' + badges.join('') + '</div>' +
        '</div>' +
        '<div class="kb-arrows">' +
          '<button type="button" class="kb-arrow" data-act="left" aria-label="Move left"' +
            (t.status === 'todo' ? ' disabled' : '') + '>&#9664;</button>' +
          '<button type="button" class="kb-arrow" data-act="right" aria-label="Move right"' +
            (t.status === 'done' ? ' disabled' : '') + '>&#9654;</button>' +
        '</div>' +
      '</div>'
    );
  },

  _renderBoard() {
    const el = this._el;
    if (!el) return;
    const self = this;
    const tasks = App.store.data.tasks;
    const meta = {
      todo:  { label: 'To Do', empty: 'Nothing to do' },
      doing: { label: 'Doing', empty: 'Nothing in progress' },
      done:  { label: 'Done',  empty: 'Nothing done yet' },
    };
    ['todo', 'doing', 'done'].forEach(function (status) {
      const col = el.querySelector('.kb-col[data-status="' + status + '"]');
      if (!col) return;
      const list = tasks.filter(t => t.status === status);
      let html =
        '<div class="kb-col-head"><span>' + meta[status].label + '</span>' +
        '<span class="kb-count">' + list.length + '</span></div>';
      if (status === 'todo') {
        html += '<div class="kb-quickadd"><input type="text" placeholder="+ Add task" ' +
                'enterkeyhint="done" aria-label="Quick add task"></div>';
      }
      html += list.length
        ? list.map(t => self._cardHTML(t)).join('')
        : '<div class="kb-empty">' + meta[status].empty + '</div>';
      if (status === 'done' && list.length) {
        html += '<button type="button" class="kb-clear" data-act="clear-done">Clear done</button>';
      }
      col.innerHTML = html;
    });
    this._clearArmed = false; // re-render resets inline confirm
  },
});
/* ============ CALENDAR — month grid + day agenda (owns: events) ============ */

  render(el) {

    const today = App.util.todayStr();

    this._year = +today.slice(0, 4);         // displayed month
    this._month = +today.slice(5, 7) - 1;    // 0-based
    this._form = null;                       // null | 'event' | 'task' | 'edit:<eventId>'

    el.innerHTML =
      '<div class="cal-head">' +
        '<button type="button" class="cal-nav" id="cal-prev" aria-label="Previous month">◀</button>' +
        '<h2 id="cal-month-lbl"></h2>' +
        '<button type="button" class="cal-nav" id="cal-next" aria-label="Next month">▶</button>' +
      '</div>' +
      '<div class="cal-wk"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>' +
      '<div class="cal-grid" id="cal-grid"></div>' +
      '<div class="cal-agenda" id="cal-agenda"></div>';

    el.querySelector('#cal-prev').addEventListener('click', () => this._nav(-1));

  },

  onDataChanged() {
    if (this._el) this._refresh();
  },

  /* ---------- internals ---------- */

  _nav(delta) {
    this._month += delta;
    if (this._month < 0) { this._month = 11; this._year--; }
    if (this._month > 11) { this._month = 0; this._year++; }
    this._renderGrid();
  },

  _refresh() {
    this._renderGrid();
    this._renderAgenda();
  },

  _pad(n) { return String(n).padStart(2, '0'); },

  _dateStr(y, m, d) { return y + '-' + this._pad(m + 1) + '-' + this._pad(d); },

  _renderGrid() {
    const el = this._el, data = App.store.data;
    const y = this._year, m = this._month;
    el.querySelector('#cal-month-lbl').textContent =
      new Date(y, m, 1).toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

    // per-day flags for the displayed month
    const prefix = y + '-' + this._pad(m + 1) + '-';
    const nowISO = App.util.nowLocalISO();
    const flags = {}; // date -> {ev, tk, od}
    const f = d => (flags[d] = flags[d] || { ev: false, tk: false, od: false });
    for (const e of data.events) if (e.date && e.date.startsWith(prefix)) f(e.date).ev = true;
    for (const t of data.tasks) {
      if (!t.due) continue;
      const d = t.due.slice(0, 10);
      if (!d.startsWith(prefix)) continue;
      f(d).tk = true;
      if (t.status !== 'done' && t.due < nowISO) f(d).od = true;
    }

    const today = App.util.todayStr();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const lead = (new Date(y, m, 1).getDay() + 6) % 7; // Mon-first offset

    let html = '';
    for (let i = 0; i < lead; i++) html += '<div class="cal-cell blank"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = this._dateStr(y, m, d);
      const fl = flags[ds];
      let cls = 'cal-cell';
      if (ds === today) cls += ' today';
      if (ds === this._sel) cls += ' sel';
      let dots = '';
      if (fl) {
        dots = '<span class="cal-dots">' +
          (fl.ev ? '<span class="cal-dot ev"></span>' : '') +
          (fl.tk ? '<span class="cal-dot tk"></span>' : '') +
          (fl.od ? '<span class="cal-dot od"></span>' : '') +

  _eventFormHTML(e) {

        '<div class="cal-times">' +
          '<label>Due time<input type="time" id="cal-tk-time" value="09:00"></label>' +

/* ============ TIMER — focus sessions (owns store.data.timer) ============ */
App.register('timer', (function () {
  'use strict';

  const RING_R = 88;
  const RING_C = 2 * Math.PI * RING_R; // circumference

  let els = null;        // cached DOM refs, set in render
  let offerBreak = false; // ephemeral: a focus session just finished, offer a break

  const T = () => App.store.data.timer;
  const clamp = (n, lo, hi) => Math.min(hi, Math.max(lo, n));

  function taskById(id) {
    if (!id) return null;
    return App.store.data.tasks.find(t => t.id === id) || null;
  }

  function fmtMs(ms) {
    const totalSec = Math.max(0, Math.round(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
  }

  // ---------- actions ----------

  function startFocus(taskId) {
    const t = T();
    t.taskId = taskId || null;
    t.mode = 'focus';
    t.startedAt = Date.now();
    t.endsAt = t.startedAt + t.focusMinutes * 60000;
    offerBreak = false;
    App.store.save();
    refresh(Date.now());
  }

  function startBreak() {
    const t = T();
    t.mode = 'break';
    t.startedAt = Date.now();
    t.endsAt = t.startedAt + t.breakMinutes * 60000;
    offerBreak = false;
    App.store.save();
    refresh(Date.now());
  }

  function giveUp() {
    const t = T();
    t.mode = 'idle';
    t.startedAt = null;
    t.endsAt = null;
    offerBreak = false;
    App.store.save();
    refresh(Date.now());
  }

  function completeFocus() {
    const t = T();
    // Credit the full session length, derived from the persisted session itself
    // (so it is correct even if the session expired while the app was closed).
    const mins = (t.startedAt && t.endsAt)
      ? Math.max(1, Math.round((t.endsAt - t.startedAt) / 60000))
      : t.focusMinutes;
    const task = taskById(t.taskId);
    if (task) task.focusedMinutes = (task.focusedMinutes || 0) + mins;
    t.mode = 'idle';
    t.startedAt = null;
    t.endsAt = null;
    offerBreak = true;
    App.store.save();
    App.util.beep(3);
    App.bus.emit('alarm:ring', {
      kind: 'timer',
      id: null,
      label: 'Focus session done' + (task ? ': ' + task.title : ''),
    });
    refresh(Date.now());
  }

  function completeBreak() {
    const t = T();
    t.mode = 'idle';
    t.startedAt = null;
    t.endsAt = null;
    offerBreak = false;
    App.store.save();
    App.util.beep(1); // gentle nudge, no alarm banner
    refresh(Date.now());
  }

  function bumpLen(key, delta, lo, hi) {
    const t = T();
    t[key] = clamp((t[key] || lo) + delta, lo, hi);
    App.store.save(); // persists the choice; onDataChanged refreshes labels
  }

  // ---------- rendering ----------

  function rebuildPicker() {
    const t = T();
    const sel = els.picker;
    const prev = (t.mode === 'focus') ? (t.taskId || '') : sel.value;
    sel.innerHTML = '';
    const optNone = document.createElement('option');
    optNone.value = '';
    optNone.textContent = 'No task — just focus';
    sel.appendChild(optNone);
    for (const task of App.store.data.tasks) {
      if (task.status === 'done') continue;
      const o = document.createElement('option');
      o.value = task.id;
      o.textContent = task.title; // textContent: no injection risk
      sel.appendChild(o);
    }
    // preserve selection if that task still exists and is not done
    sel.value = prev;
    if (sel.value !== prev) sel.value = '';
  }

  function selectedTaskId() {
    const t = T();
    if (t.mode === 'focus' && t.taskId) return t.taskId;
    return els.picker.value || null;
  }

  function updateBadge() {
    const task = taskById(selectedTaskId());
    els.badge.textContent = task
      ? 'This task: ' + (task.focusedMinutes || 0) + ' min total'
      : '';
  }

  function updateCountdown(now) {
    const t = T();
    let remaining, frac;
    if (t.mode !== 'idle' && t.endsAt) {
      remaining = Math.max(0, t.endsAt - now);
      const total = Math.max(1, (t.endsAt - (t.startedAt || (t.endsAt - 1))));
      frac = remaining / total;
    } else if (offerBreak) {
      remaining = t.breakMinutes * 60000;
      frac = 1;
    } else {
      remaining = t.focusMinutes * 60000;
      frac = 1;
    }
    els.clock.textContent = fmtMs(remaining);
    els.ring.style.strokeDashoffset = String(RING_C * (1 - clamp(frac, 0, 1)));
    els.ring.style.stroke = (t.mode === 'break') ? 'var(--good)' : 'var(--accent)';
  }

  function refresh(now) {
    const t = T();
    // guard against corrupt state (running mode but no end time)
    if (t.mode !== 'idle' && !t.endsAt) { t.mode = 'idle'; t.startedAt = null; }

    rebuildPicker();

    const running = t.mode !== 'idle';
    els.picker.disabled = running;
    els.focusVal.textContent = t.focusMinutes + ' min';
    els.breakVal.textContent = t.breakMinutes + ' min';
    for (const b of els.stepBtns) b.disabled = running;

    if (t.mode === 'focus') {

      els.status.textContent = task ? ('Focusing on: ' + task.title) : 'Focusing';

    } else {
      els.status.textContent = 'Ready to focus';
    }

    els.btnStart.style.display = (!running && !offerBreak) ? '' : 'none';
    els.btnGiveUp.style.display = running ? '' : 'none';
    els.btnBreak.style.display = (!running && offerBreak) ? '' : 'none';
    els.btnSkip.style.display = (!running && offerBreak) ? '' : 'none';

    updateCountdown(now || Date.now());
    updateBadge();
  }

  return {

    order: 6,

    styles: `

        transition: stroke-dashoffset 0.5s linear; }

        font-size: 46px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
      #view-timer .tm-status { text-align: center; font-size: 16px; min-height: 22px; }

      #view-timer .tm-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    `,

    render(el) {
      el.innerHTML = `
        <div class="card tm-wrap">
          <div>
            <div class="tm-label">Task</div>
            <select id="tm-picker"></select>
          </div>
          <div class="tm-row">
            <span class="tm-label">Focus length</span>
            <span class="tm-step">
              <button type="button" id="tm-f-minus" aria-label="Shorter focus">−</button>
              <span class="tm-val" id="tm-f-val"></span>
              <button type="button" id="tm-f-plus" aria-label="Longer focus">+</button>
            </span>
          </div>
          <div class="tm-row">
            <span class="tm-label">Break length</span>
            <span class="tm-step">
              <button type="button" id="tm-b-minus" aria-label="Shorter break">−</button>
              <span class="tm-val" id="tm-b-val"></span>
              <button type="button" id="tm-b-plus" aria-label="Longer break">+</button>
            </span>
          </div>
          <div class="tm-status" id="tm-status"></div>
          <div class="tm-stage">
            <svg viewBox="0 0 200 200" aria-hidden="true">
              <circle class="tm-track" cx="100" cy="100" r="${RING_R}"></circle>
              <circle class="tm-ring" id="tm-ring" cx="100" cy="100" r="${RING_R}"
                stroke-dasharray="${RING_C}" stroke-dashoffset="0"></circle>
            </svg>
            <div class="tm-clock" id="tm-clock">--:--</div>
          </div>
          <div class="tm-badge" id="tm-badge"></div>

            <button type="button" class="btn" id="tm-skip">Skip break</button>
          </div>
        </div>
      `;
      const $ = id => el.querySelector('#' + id);
      els = {
        picker: $('tm-picker'),
        focusVal: $('tm-f-val'),
        breakVal: $('tm-b-val'),
        stepBtns: [$('tm-f-minus'), $('tm-f-plus'), $('tm-b-minus'), $('tm-b-plus')],
        status: $('tm-status'),
        ring: $('tm-ring'),
        clock: $('tm-clock'),
        badge: $('tm-badge'),
        btnStart: $('tm-start'),
        btnGiveUp: $('tm-giveup'),
        btnBreak: $('tm-break'),
        btnSkip: $('tm-skip'),
      };

      $('tm-f-minus').addEventListener('click', () => bumpLen('focusMinutes', -5, 5, 90));
      $('tm-f-plus').addEventListener('click', () => bumpLen('focusMinutes', +5, 5, 90));
      $('tm-b-minus').addEventListener('click', () => bumpLen('breakMinutes', -1, 1, 30));
      $('tm-b-plus').addEventListener('click', () => bumpLen('breakMinutes', +1, 1, 30));
      els.picker.addEventListener('change', updateBadge);
      els.btnStart.addEventListener('click', () => startFocus(els.picker.value || null));
      els.btnGiveUp.addEventListener('click', giveUp);
      els.btnBreak.addEventListener('click', startBreak);
      els.btnSkip.addEventListener('click', () => { offerBreak = false; refresh(Date.now()); });

      App.bus.on('timer:start', payload => {
        const id = payload && payload.taskId;
        startFocus(id || null);
        App.ui.showTab('timer');
      });

      // Resume correctly from persisted state (running sessions survive restarts;
      // sessions that expired while closed are settled on the first onTick).
      refresh(Date.now());
    },

    onDataChanged() {
      if (els) refresh(Date.now());
    },

    onTick(now) {
      if (!els) return;
      const t = T();
      if (t.mode === 'idle') return;
      if (!t.endsAt) { t.mode = 'idle'; t.startedAt = null; App.store.save(); return; }

        if (t.mode === 'focus') completeFocus();
        else completeBreak();
      } else {
        updateCountdown(now);
      }
    },
  };
})());

  _confirmDelete: false,
  _confirmDelT: null,

  render(el) {

      <div class="shop-chips" id="shop-chips"></div>

        <button type="button" class="btn btn-primary" id="shop-add-btn">Add</button>

  onDataChanged() { this._renderAll(); },

  // Ensure settings.shoppingLists exists and every item has a valid listId.
  // Returns true if anything changed (caller must save). Idempotent.
  _migrate() {
    const d = App.store.data;
    if (!d.settings || typeof d.settings !== 'object') d.settings = {};
    let changed = false;
    if (!Array.isArray(d.settings.shoppingLists) || !d.settings.shoppingLists.length) {
      d.settings.shoppingLists = [{ id: App.util.uuid(), name: 'Groceries' }];
      changed = true;
    }
    const ids = new Set(d.settings.shoppingLists.map(l => l.id));
    const firstId = d.settings.shoppingLists[0].id;
    for (const item of (d.shopping || [])) {

      const edit = document.createElement('input');
      edit.type = 'text';
      edit.className = 'shop-edit';
      edit.value = item.text;

        if (saved) return;
        saved = true;

      edit.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') commit();
        else if (e.key === 'Escape') { saved = true; this._editingId = null; this._renderList(); }
      });
      row.appendChild(edit);

    } else {
      const text = document.createElement('div');
      text.className = 'shop-text';
      text.innerHTML = App.util.esc(item.text);
      text.addEventListener('click', () => {
        this._editingId = item.id;
        this._renderList();
      });
      row.appendChild(text);
    }

    del.type = 'button';
    del.className = 'shop-del';
    del.setAttribute('aria-label', 'Delete item');

/* ============ ALARMS — reminders & ringing banner ============ */
App.register('alarms', {
  title: 'Alarms',
  icon: '⏰',
  order: 9,

  styles: `
#view-alarms .al-form { display: flex; flex-direction: column; gap: 10px; padding: 14px; }
#view-alarms .al-form input[type="text"],
#view-alarms .al-form input[type="datetime-local"],
#view-alarms .al-form select {
  width: 100%; min-height: 44px; box-sizing: border-box;
  background: var(--bg); color: var(--text);
  border: 1px solid #2a3040; border-radius: var(--radius); padding: 10px 12px; font-size: 16px;
}
#view-alarms .al-form label { color: var(--muted); font-size: 13px; display: block; margin-bottom: 4px; }
#view-alarms .al-err { color: var(--bad); font-size: 13px; min-height: 16px; }
#view-alarms .al-add-btn { min-height: 48px; font-size: 16px; }
#view-alarms .al-section-title { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .06em; margin: 16px 4px 8px; }
#view-alarms .al-empty { color: var(--muted); text-align: center; padding: 24px 12px; font-size: 15px; }
#view-alarms .al-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; margin-bottom: 8px; }
#view-alarms .al-row-main { flex: 1; min-width: 0; }
#view-alarms .al-row-text { font-size: 16px; word-break: break-word; }
#view-alarms .al-row-when { color: var(--accent); font-size: 13px; margin-top: 2px; }
#view-alarms .al-row.past .al-row-when { color: var(--muted); }
#view-alarms .al-row-task { display: inline-block; color: var(--good); font-size: 13px; margin-top: 4px; padding: 4px 0; min-height: 0; background: none; border: none; text-decoration: underline; }
#view-alarms .al-row-status { color: var(--muted); font-size: 12px; margin-top: 2px; }
#view-alarms .al-del {
  min-width: 44px; min-height: 44px; flex: 0 0 auto;
  background: none; border: none; color: var(--muted); font-size: 20px; border-radius: var(--radius);
}
#view-alarms .al-del:active { color: var(--bad); }
#view-alarms .al-past-toggle {
  width: 100%; min-height: 44px; background: none; border: 1px solid #2a3040;
  border-radius: var(--radius); color: var(--muted); font-size: 14px; margin-top: 4px;
}
#view-alarms .al-clear-btn { width: 100%; min-height: 44px; margin-top: 8px; }
#view-alarms .al-clear-btn.armed { color: var(--bad); border-color: var(--bad); }
#view-alarms .ring-overlay {
  position: fixed; inset: 0; z-index: 999;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(10, 12, 17, 0.96); padding: 24px; text-align: center;
}
#view-alarms .ring-overlay.active { display: flex; }
#view-alarms .ring-emoji { font-size: 72px; animation: al-shake 1s ease-in-out infinite; }
@keyframes al-shake {
  0%, 100% { transform: rotate(0deg); }
  20% { transform: rotate(-12deg); }
  40% { transform: rotate(10deg); }
  60% { transform: rotate(-8deg); }
  80% { transform: rotate(6deg); }
}
#view-alarms .ring-text { color: var(--text); font-size: 24px; font-weight: 700; margin-top: 18px; word-break: break-word; max-width: 100%; }
#view-alarms .ring-when { color: var(--muted); font-size: 16px; margin-top: 8px; }
#view-alarms .ring-btns { display: flex; flex-direction: column; gap: 12px; margin-top: 28px; width: 100%; max-width: 340px; }
#view-alarms .ring-btns .btn { min-height: 52px; font-size: 17px; width: 100%; }
#view-alarms .ring-queue-note { color: var(--muted); font-size: 13px; margin-top: 16px; }
`,

  // ---- internal state (not persisted) ----
  _el: null,
  _queue: [],          // [{kind:'reminder', remId} | {kind:'other', label, id}]
  _current: null,      // item currently shown in banner
  _rebeeps: 0,
  _lastBeepAt: 0,
  _pastOpen: false,
  _clearArmed: false,
  _clearArmT: null,

  render(el) {
    this._el = el;
    el.innerHTML =
      '<div class="card al-form">' +
        '<div><label for="al-text">Reminder</label>' +
        '<input type="text" id="al-text" placeholder="What should I remind you about?" maxlength="200"></div>' +
        '<div><label for="al-at">When</label>' +
        '<input type="datetime-local" id="al-at"></div>' +
        '<div><label for="al-task">Attach to task (optional)</label>' +
        '<select id="al-task"><option value="">— none —</option></select></div>' +
        '<div class="al-err" id="al-err"></div>' +
        '<button type="button" class="btn btn-primary al-add-btn" id="al-add">Add reminder</button>' +
      '</div>' +
      '<div class="al-section-title">Upcoming</div>' +
      '<div id="al-upcoming"></div>' +
      '<div id="al-past-wrap"></div>' +
      '<div class="ring-overlay" id="al-ring"></div>';

    this._resetAtInput();
    this._fillTaskSelect();
    this._renderList();

    el.querySelector('#al-add').addEventListener('click', () => this._add());

    // Rings from other modules (e.g. focus timer finishing)
    App.bus.on('alarm:ring', (p) => {
      p = p || {};
      if (p.kind === 'reminder' && p.id) {
        this._enqueue({ kind: 'reminder', remId: p.id });
      } else {
        this._enqueue({ kind: 'other', label: p.label || 'Alarm', id: p.id || null });
      }
      App.util.beep(3);
    });
  },

  onDataChanged() {
    if (!this._el) return;
    this._fillTaskSelect();
    this._renderList();
  },

  onTick(now) {
    if (!this._el) return;
    // 1) fire due reminders
    const due = [];
    for (const r of App.store.data.reminders) {
      if (!r.fired && !r.dismissed && r.at) {
        const t = new Date(r.at).getTime();
        if (!isNaN(t) && t <= now) due.push(r);
      }
    }
    if (due.length) {
      due.sort((a, b) => (a.at < b.at ? -1 : 1));
      for (const r of due) {
        r.fired = true;
        this._enqueue({ kind: 'reminder', remId: r.id });
      }
      App.store.save();
      App.util.beep(3);
    }
    // 2) re-beep while banner is up (every 15s, max 4)
    if (this._current && this._rebeeps < 4 && now - this._lastBeepAt >= 15000) {
      this._rebeeps++;
      this._lastBeepAt = now;
      App.util.beep(2);
    }
  },

  // ---------- form ----------
  _resetAtInput() {
    const at = this._el.querySelector('#al-at');
    if (at) at.value = this._plusMinutesLocal(60);
  },

  _plusMinutesLocal(mins) {
    const d = new Date(Date.now() + mins * 60000);
    return App.util.todayStr(d) + 'T' + App.util.pad(d.getHours()) + ':' + App.util.pad(d.getMinutes());
  },

  _fillTaskSelect() {
    const sel = this._el.querySelector('#al-task');
    if (!sel) return;
    const prev = sel.value;
    let html = '<option value="">— none —</option>';
    for (const t of App.store.data.tasks) {
      if (t.status === 'done') continue;
      html += '<option value="' + App.util.esc(t.id) + '">' + App.util.esc(t.title) + '</option>';
    }
    sel.innerHTML = html;
    if (prev && sel.querySelector('option[value="' + prev.replace(/"/g, '\\"') + '"]')) sel.value = prev;
  },

  _add() {
    const textEl = this._el.querySelector('#al-text');
    const atEl = this._el.querySelector('#al-at');
    const selEl = this._el.querySelector('#al-task');
    const errEl = this._el.querySelector('#al-err');
    errEl.textContent = '';

    let text = (textEl.value || '').trim();
    const taskId = selEl.value || null;
    if (!text && !taskId) {
      errEl.textContent = 'Type a reminder or pick a task.';
      return;
    }
    if (!text && taskId) {
      const task = App.store.data.tasks.find(t => t.id === taskId);
      text = task ? task.title : 'Task reminder';
    }
    let at = atEl.value;
    if (!at || isNaN(new Date(at).getTime())) at = this._plusMinutesLocal(60);

    App.store.data.reminders.push({
      id: App.util.uuid(),
      text: text,
      at: at,
      taskId: taskId,
      fired: false,
      dismissed: false,
    });
    App.store.save();
    textEl.value = '';
    selEl.value = '';
    this._resetAtInput();
    App.ui.toast('Reminder set for ' + App.util.fmtDate(at) + ' ' + App.util.fmtTime(at));
  },

  // ---------- list ----------
  _renderList() {
    const rems = App.store.data.reminders;
    const upcoming = rems.filter(r => !r.fired && !r.dismissed)
      .slice().sort((a, b) => (a.at < b.at ? -1 : a.at > b.at ? 1 : 0));
    const past = rems.filter(r => r.fired || r.dismissed)
      .slice().sort((a, b) => (a.at < b.at ? 1 : a.at > b.at ? -1 : 0));

    const up = this._el.querySelector('#al-upcoming');
    if (!upcoming.length) {
      up.innerHTML = '<div class="al-empty">No upcoming reminders — set one above and I\'ll ring. ⏰</div>';
    } else {
      up.innerHTML = upcoming.map(r => this._rowHTML(r, false)).join('');
    }

    const pw = this._el.querySelector('#al-past-wrap');
    if (!past.length) {
      pw.innerHTML = '';
    } else {
      let html = '<button type="button" class="al-past-toggle" id="al-past-toggle">' +
        (this._pastOpen ? '▾' : '▸') + ' Past (' + past.length + ')</button>';
      if (this._pastOpen) {
        html += '<div id="al-past-list" style="margin-top:8px">' +
          past.map(r => this._rowHTML(r, true)).join('') +
          '<button type="button" class="btn al-clear-btn' + (this._clearArmed ? ' armed' : '') +
          '" id="al-clear">' + (this._clearArmed ? 'Tap again to clear ' + past.length : 'Clear past') + '</button>' +
          '</div>';
      }
      pw.innerHTML = html;
      pw.querySelector('#al-past-toggle').addEventListener('click', () => {
        this._pastOpen = !this._pastOpen;
        this._renderList();
      });
      const clearBtn = pw.querySelector('#al-clear');
      if (clearBtn) clearBtn.addEventListener('click', () => this._clearPast());
    }

    // row actions (delete + open linked task)
    this._el.querySelectorAll('.al-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-id');
        const i = App.store.data.reminders.findIndex(r => r.id === id);
        if (i >= 0) { App.store.data.reminders.splice(i, 1); App.store.save(); }
      });
    });
    this._el.querySelectorAll('.al-row-task').forEach(btn => {
      btn.addEventListener('click', () => {
        const tid = btn.getAttribute('data-task');
        App.ui.showTab('tasks');
        App.bus.emit('task:open', { taskId: tid });
      });
    });
  },

  _rowHTML(r, isPast) {
    const task = r.taskId ? App.store.data.tasks.find(t => t.id === r.taskId) : null;
    let h = '<div class="card al-row' + (isPast ? ' past' : '') + '">' +
      '<div class="al-row-main">' +
      '<div class="al-row-text">' + App.util.esc(r.text) + '</div>' +
      '<div class="al-row-when">' + App.util.esc(App.util.fmtDate(r.at)) + ' · ' + App.util.esc(App.util.fmtTime(r.at)) + '</div>';
    if (task) {
      h += '<button type="button" class="al-row-task" data-task="' + App.util.esc(task.id) + '">↳ ' + App.util.esc(task.title) + '</button>';
    }
    if (isPast) {
      h += '<div class="al-row-status">' + (r.dismissed ? 'dismissed' : 'rang') + '</div>';
    }
    h += '</div>' +
      '<button type="button" class="al-del" data-id="' + App.util.esc(r.id) + '" aria-label="Delete reminder">✕</button>' +
      '</div>';
    return h;
  },

  _clearPast() {
    if (!this._clearArmed) {
      this._clearArmed = true;
      this._renderList();
      clearTimeout(this._clearArmT);
      this._clearArmT = setTimeout(() => { this._clearArmed = false; this._renderList(); }, 3000);
      return;
    }
    clearTimeout(this._clearArmT);
    this._clearArmed = false;
    App.store.data.reminders = App.store.data.reminders.filter(r => !r.fired && !r.dismissed);
    App.store.save();
    App.ui.toast('Past reminders cleared');
  },

  // ---------- ringing banner ----------
  _enqueue(item) {
    this._queue.push(item);
    if (!this._current) this._showNext();
  },

  _showNext() {
    const overlay = this._el.querySelector('#al-ring');
    let item = null;
    while (this._queue.length) {
      const cand = this._queue.shift();
      if (cand.kind === 'reminder') {
        const r = App.store.data.reminders.find(x => x.id === cand.remId);
        if (r && !r.dismissed) { item = cand; break; } // skip deleted/already-dismissed
      } else { item = cand; break; }
    }
    if (!item) {
      this._current = null;
      overlay.classList.remove('active');
      overlay.innerHTML = '';
      return;
    }
    this._current = item;
    this._rebeeps = 0;
    this._lastBeepAt = Date.now();

    let text, when = '', taskId = null;
    if (item.kind === 'reminder') {
      const r = App.store.data.reminders.find(x => x.id === item.remId);
      text = r.text;
      when = App.util.fmtDate(r.at) + ' · ' + App.util.fmtTime(r.at);
      taskId = r.taskId || null;
    } else {
      text = item.label;
      when = App.util.fmtTime(App.util.nowLocalISO());
    }

    let html = '<div class="ring-emoji">⏰</div>' +
      '<div class="ring-text">' + App.util.esc(text) + '</div>' +
      '<div class="ring-when">' + App.util.esc(when) + '</div>' +
      '<div class="ring-btns">';
    html += '<button type="button" class="btn btn-primary" id="al-r-dismiss">Dismiss</button>';
    if (item.kind === 'reminder') {
      html += '<button type="button" class="btn" id="al-r-snooze">Snooze 10 min</button>';
      if (taskId) {
        html += '<button type="button" class="btn" id="al-r-open">Open task</button>';
        html += '<button type="button" class="btn" id="al-r-done">Mark done</button>';
      }
    }
    html += '</div>';
    if (this._queue.length) {
      html += '<div class="ring-queue-note">+' + this._queue.length + ' more waiting</div>';
    }
    const overlay2 = overlay;
    overlay2.innerHTML = html;
    overlay2.classList.add('active');

    const getRem = () => item.kind === 'reminder'
      ? App.store.data.reminders.find(x => x.id === item.remId) : null;

    overlay2.querySelector('#al-r-dismiss').addEventListener('click', () => {
      const r = getRem();
      if (r) { r.dismissed = true; App.store.save(); }
      this._showNext();
    });
    const sn = overlay2.querySelector('#al-r-snooze');
    if (sn) sn.addEventListener('click', () => {
      const r = getRem();
      if (r) {
        r.fired = false;
        r.at = this._plusMinutesLocal(10);
        App.store.save();
        App.ui.toast('Snoozed until ' + App.util.fmtTime(r.at));
      }
      this._showNext();
    });
    const op = overlay2.querySelector('#al-r-open');
    if (op) op.addEventListener('click', () => {
      const r = getRem();
      if (r) { r.dismissed = true; App.store.save(); }
      this._showNext();
      App.ui.showTab('tasks');
      App.bus.emit('task:open', { taskId: taskId });
    });
    const dn = overlay2.querySelector('#al-r-done');
    if (dn) dn.addEventListener('click', () => {
      const r = getRem();
      if (r) r.dismissed = true;
      const task = App.store.data.tasks.find(t => t.id === taskId);
      if (task) {
        task.status = 'done';
        task.completedAt = new Date().toISOString();
        App.ui.toast('Task done: ' + task.title);
      }
      App.store.save();
      this._showNext();
    });
  },
});

/* ---- boot ---- */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function () { window.App.boot(); });
} else {
  window.App.boot();
}
/* ---- offline cache (only when served over http/https; harmless otherwise) ---- */
if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.protocol === 'http:')) {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js').then(function () {
      return navigator.serviceWorker.ready;
    }).then(function () {
      // only announce on a fresh install, not every launch
      if (!localStorage.getItem('dreamapp.offline-ready')) {
        localStorage.setItem('dreamapp.offline-ready', '1');
        if (window.App && window.App.ui) window.App.ui.toast('Saved for offline use ✓ — safe to stop the server');
      }
    }).catch(function () { /* offline cache unavailable; app still works while served */ });
  });
}
</script>
</body>
</html>
